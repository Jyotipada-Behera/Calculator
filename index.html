<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&family=Spinnaker&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Spinnaker&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main">
        <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>
        <div class="top">
            <div>
                <h2 id="ques"></h2>
                <h1 id="ans"></h1>
            </div>
        </div>
        <div class="buttons">
            <div class="row1">
                <button onclick="allclear()" class="black ">AC</button>
                <button onclick="bracket()" class="black ">( )</button>
                <button onclick="percent()" class="black ">%</button>
                <button onclick="devide()" class="green">/</button>
            </div>
            <div class="row2">
                <button onclick="seven()">7</button>
                <button onclick="eight()">8</button>
                <button onclick="nine()">9</button>
                <button onclick="multiply()" class="green">x</button>
            </div>
            <div class="row3">
                <button onclick="four()">4</button>
                <button onclick="five()">5</button>
                <button onclick="six()">6</button>
                <button onclick="subtract()" class="green">-</button>
            </div>
            <div class="row4">
                <button onclick="one()">1</button>
                <button onclick="two()">2</button>
                <button onclick="three()">3</button>
                <button onclick="sum()" class="green">+</button>
            </div>
            <div class="row5">
                <button onclick="zero()">0</button>
                <button onclick="decimal()">.</button>
                <button onclick="equal()">=</button>
                <button onclick="back()" class="green"><img src="images/Delete-two (删除).svg" alt=""></button>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
